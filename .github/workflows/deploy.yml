name: Deploy Pygame to GitHub Pages

on:
  push:
    branches:
      - main  # Lưu ý: Đổi thành 'master' nếu nhánh chính trên GitHub của bạn tên là master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Server sẽ dùng bản ổn định này để dịch game

      - name: Install Pygbag
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build Game using Pygbag
        run: |
          # Lệnh dịch thư mục hiện tại ra định dạng Web
          python -m pygbag --build .

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web # Nơi chứa sản phẩm web sau khi dịch xong
          branch: gh-pages # Đẩy sản phẩm lên nhánh mới tên là gh-pages